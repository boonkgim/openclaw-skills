<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>Presentation</title>
  <style>
    /* ================================================================
       THEME TOKENS — edit these to restyle the entire deck
       ================================================================ */
    :root {
      /* Backgrounds */
      --bg-primary: #0f0f1a;
      --bg-secondary: #1a1a2e;
      --bg-surface: rgba(255, 255, 255, 0.04);
      --bg-surface-hover: rgba(255, 255, 255, 0.08);

      /* Text */
      --text-primary: #ffffff;
      --text-secondary: #b0b0c0;
      --text-muted: #6a6a80;

      /* Accent */
      --accent: #4fc3f7;
      --accent-soft: rgba(79, 195, 247, 0.15);
      --accent-glow: rgba(79, 195, 247, 0.3);

      /* Typography */
      --font-heading: system-ui, -apple-system, 'Segoe UI', sans-serif;
      --font-body: system-ui, -apple-system, 'Segoe UI', sans-serif;
      --font-mono: 'SF Mono', 'Fira Code', 'Consolas', monospace;

      --text-xs: clamp(0.75rem, 1vw, 0.875rem);
      --text-sm: clamp(0.875rem, 1.2vw, 1rem);
      --text-base: clamp(1rem, 1.5vw, 1.25rem);
      --text-lg: clamp(1.25rem, 2vw, 1.75rem);
      --text-xl: clamp(1.75rem, 2.5vw, 2.25rem);
      --text-2xl: clamp(2.25rem, 3.5vw, 3.25rem);
      --text-3xl: clamp(3rem, 5vw, 4.5rem);

      /* Spacing */
      --space-xs: 0.5rem;
      --space-sm: 1rem;
      --space-md: 2rem;
      --space-lg: 3rem;
      --space-xl: 5rem;

      /* Effects */
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
      --border: 1px solid rgba(255, 255, 255, 0.08);
      --transition: 200ms ease;

      /* Slide */
      --slide-padding: var(--space-xl) var(--space-xl);
    }

    /* ================================================================
       RESET & BASE
       ================================================================ */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: var(--text-base);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ================================================================
       SLIDE CONTAINER
       ================================================================ */
    #slide-container {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    .slide {
      position: absolute;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      padding: var(--slide-padding);
      display: none;
      flex-direction: column;
      justify-content: center;
      background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
      opacity: 0;
      transition: opacity var(--transition);
    }

    .slide.active {
      display: flex;
      opacity: 1;
    }

    /* Dot pattern overlay */
    .slide::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
      z-index: 0;
    }

    .slide > * {
      position: relative;
      z-index: 1;
    }

    /* ================================================================
       TYPOGRAPHY
       ================================================================ */
    h1 {
      font-family: var(--font-heading);
      font-size: var(--text-3xl);
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
      line-height: 1.15;
    }

    h2 {
      font-family: var(--font-heading);
      font-size: var(--text-2xl);
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
      margin-bottom: var(--space-lg);
      line-height: 1.2;
    }

    h3 {
      font-family: var(--font-heading);
      font-size: var(--text-xl);
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: var(--space-sm);
      line-height: 1.3;
    }

    p {
      font-size: var(--text-lg);
      color: var(--text-secondary);
      max-width: 60ch;
      line-height: 1.7;
    }

    /* ================================================================
       LISTS
       ================================================================ */
    ul, ol {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
    }

    ul li {
      font-size: var(--text-lg);
      color: var(--text-secondary);
      padding-left: var(--space-md);
      position: relative;
      line-height: 1.6;
    }

    ul li::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0.65em;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
    }

    ol {
      counter-reset: ol-counter;
    }

    ol li {
      font-size: var(--text-lg);
      color: var(--text-secondary);
      padding-left: var(--space-lg);
      position: relative;
      counter-increment: ol-counter;
      line-height: 1.6;
    }

    ol li::before {
      content: counter(ol-counter);
      position: absolute;
      left: 0;
      top: 0;
      font-size: var(--text-lg);
      font-weight: 700;
      color: var(--accent);
      width: 1.5em;
      text-align: center;
    }

    /* ================================================================
       CODE
       ================================================================ */
    pre {
      background: var(--bg-surface);
      border-left: 3px solid var(--accent);
      border-radius: var(--radius);
      padding: var(--space-md);
      overflow-x: auto;
      font-family: var(--font-mono);
      font-size: var(--text-sm);
      color: var(--text-secondary);
      line-height: 1.8;
      box-shadow: var(--shadow);
    }

    code {
      font-family: var(--font-mono);
      font-size: 0.9em;
      background: var(--bg-surface);
      padding: 0.15em 0.4em;
      border-radius: 4px;
      color: var(--accent);
    }

    pre code {
      background: none;
      padding: 0;
      color: inherit;
    }

    /* ================================================================
       BLOCKQUOTE
       ================================================================ */
    blockquote {
      border-left: 3px solid var(--accent);
      padding-left: var(--space-md);
      font-size: var(--text-xl);
      color: var(--text-secondary);
      font-style: italic;
      line-height: 1.6;
      max-width: 50ch;
    }

    blockquote cite {
      display: block;
      margin-top: var(--space-sm);
      font-size: var(--text-base);
      color: var(--text-muted);
      font-style: normal;
    }

    /* ================================================================
       IMAGES
       ================================================================ */
    .slide img {
      max-width: 100%;
      max-height: 65vh;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      object-fit: contain;
    }

    /* ================================================================
       CARDS
       ================================================================ */
    .card {
      background: var(--bg-surface);
      border: var(--border);
      border-radius: var(--radius);
      padding: var(--space-md);
      box-shadow: var(--shadow);
      transition: background var(--transition);
    }

    .card:hover {
      background: var(--bg-surface-hover);
    }

    .card h3 {
      font-size: var(--text-lg);
      margin-bottom: var(--space-xs);
    }

    .card p {
      font-size: var(--text-base);
      color: var(--text-secondary);
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--space-md);
      width: 100%;
    }

    .card-grid.cols-3 {
      grid-template-columns: repeat(3, 1fr);
    }

    /* ================================================================
       SLIDE TYPE: TITLE
       ================================================================ */
    .slide-title {
      align-items: center;
      text-align: center;
      justify-content: center;
      background:
        radial-gradient(ellipse at 50% 50%, var(--accent-glow) 0%, transparent 60%),
        linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
    }

    .slide-title h1 {
      margin-bottom: var(--space-sm);
    }

    .slide-title .subtitle {
      font-size: var(--text-xl);
      color: var(--text-secondary);
      margin-bottom: var(--space-lg);
    }

    .slide-title .author {
      font-size: var(--text-base);
      color: var(--text-muted);
    }

    /* ================================================================
       SLIDE TYPE: CONTENT
       ================================================================ */
    .slide-content {
      justify-content: center;
    }

    /* ================================================================
       SLIDE TYPE: TWO COLUMNS
       ================================================================ */
    .slide-two-col {
      justify-content: center;
    }

    .columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-lg);
      width: 100%;
    }

    .columns .col {
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
    }

    .columns .col + .col {
      border-left: var(--border);
      padding-left: var(--space-lg);
    }

    /* ================================================================
       SLIDE TYPE: IMAGE
       ================================================================ */
    .slide-image {
      align-items: center;
    }

    .slide-image .image-container {
      display: flex;
      justify-content: center;
      align-items: center;
      flex: 1;
      width: 100%;
    }

    /* ================================================================
       SLIDE TYPE: QUOTE
       ================================================================ */
    .slide-quote {
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .slide-quote .quote-mark {
      font-size: 8rem;
      line-height: 1;
      color: var(--accent);
      opacity: 0.4;
      font-family: Georgia, serif;
      margin-bottom: calc(-1 * var(--space-lg));
    }

    .slide-quote blockquote {
      border-left: none;
      padding-left: 0;
      text-align: center;
      max-width: 40ch;
      font-size: var(--text-2xl);
    }

    .slide-quote blockquote cite {
      font-size: var(--text-lg);
    }

    /* ================================================================
       SLIDE TYPE: CODE
       ================================================================ */
    .slide-code {
      justify-content: center;
    }

    .slide-code pre {
      font-size: var(--text-base);
      max-height: 60vh;
    }

    /* Syntax coloring helpers */
    .kw { color: #c792ea; }   /* keyword */
    .fn { color: #82aaff; }   /* function */
    .st { color: #c3e88d; }   /* string */
    .cm { color: #546e7a; }   /* comment */
    .nr { color: #f78c6c; }   /* number */
    .op { color: #89ddff; }   /* operator */

    /* ================================================================
       SLIDE TYPE: DIVIDER
       ================================================================ */
    .slide-divider {
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .slide-divider h1 {
      font-size: var(--text-3xl);
      margin-bottom: var(--space-sm);
    }

    .slide-divider h1::after {
      content: '';
      display: block;
      width: 120px;
      height: 4px;
      background: var(--accent);
      margin: var(--space-md) auto 0;
      border-radius: 2px;
    }

    .slide-divider p {
      text-align: center;
      color: var(--text-muted);
      font-size: var(--text-lg);
    }

    /* ================================================================
       SLIDE TYPE: STAT
       ================================================================ */
    .slide-stat {
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .stat-number {
      font-size: 8rem;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -0.03em;
      line-height: 1;
      text-shadow: 0 0 40px var(--accent-glow);
    }

    .stat-label {
      font-size: var(--text-xl);
      color: var(--text-secondary);
      margin-top: var(--space-sm);
    }

    .stat-description {
      font-size: var(--text-base);
      color: var(--text-muted);
      margin-top: var(--space-xs);
      max-width: 40ch;
    }

    /* ================================================================
       SLIDE TYPE: CARDS
       ================================================================ */
    .slide-cards {
      justify-content: center;
    }

    /* ================================================================
       SLIDE TYPE: END
       ================================================================ */
    .slide-end {
      align-items: center;
      justify-content: center;
      text-align: center;
      background:
        radial-gradient(ellipse at 50% 50%, var(--accent-glow) 0%, transparent 60%),
        linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
    }

    .slide-end h1 {
      margin-bottom: var(--space-md);
    }

    .slide-end .contact {
      font-size: var(--text-lg);
      color: var(--text-muted);
    }

    .slide-end .contact a {
      color: var(--accent);
      text-decoration: none;
    }

    /* ================================================================
       ANIMATIONS
       ================================================================ */
    /* Whole-slide fade-in */
    .slide.active {
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* ================================================================
       PROGRESS BAR
       ================================================================ */
    .progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      height: 3px;
      background: var(--accent);
      z-index: 100;
      transition: width var(--transition);
    }

    /* ================================================================
       SLIDE COUNTER
       ================================================================ */
    .slide-counter {
      position: fixed;
      bottom: var(--space-md);
      right: var(--space-md);
      font-size: var(--text-sm);
      color: var(--text-muted);
      font-family: var(--font-mono);
      z-index: 100;
      user-select: none;
    }

    /* ================================================================
       PRINT / PDF EXPORT
       ================================================================ */
    @media print {
      @page {
        size: 13.333in 7.5in;
        margin: 0;
      }

      html, body {
        overflow: visible;
        width: 13.333in;
      }

      #slide-container {
        position: static;
        width: 13.333in;
        height: auto;
      }

      .slide {
        position: relative !important;
        display: flex !important;
        opacity: 1 !important;
        page-break-after: always;
        page-break-inside: avoid;
        width: 13.333in !important;
        height: 7.5in !important;
        break-after: page;
      }

      .progress-bar,
      .slide-counter {
        display: none !important;
      }

      /* Preserve colors and backgrounds */
      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      /* Strip effects that PDF/print cannot render */
      * {
        box-shadow: none !important;
        text-shadow: none !important;
        filter: none !important;
        backdrop-filter: none !important;
      }

      /* Replace card shadows with a clean border */
      .card {
        border: 1px solid rgba(0, 0, 0, 0.12) !important;
      }

      /* Remove dot pattern overlay */
      .slide::before {
        display: none !important;
      }

      /* Disable animations */
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
      }

      .animate-in {
        opacity: 1 !important;
        transform: none !important;
      }
    }
  </style>
</head>
<body>

  <!-- Progress bar -->
  <div class="progress-bar" id="progress-bar"></div>

  <!-- Slide counter -->
  <div class="slide-counter" id="slide-counter"></div>

  <!-- Slides render here -->
  <div id="slide-container"></div>

  <!-- ============================================================
       SLIDE MANIFEST — list all slide files in order
       ============================================================ -->
  <script id="slide-manifest" type="application/json">
  ["01-title.html","02-content.html","03-two-col.html","04-quote.html","05-code.html","06-stat.html","07-cards.html","08-image.html","09-divider.html","10-end.html"]
  </script>

  <script>
    (function () {
      /* ── State ── */
      let current = 0;
      let slides = [];

      /* ── Load slides from manifest ── */
      async function loadSlides() {
        const manifest = JSON.parse(
          document.getElementById('slide-manifest').textContent
        );
        const container = document.getElementById('slide-container');

        for (const file of manifest) {
          try {
            const res = await fetch('slides/' + file);
            if (!res.ok) continue;
            const html = await res.text();

            /* Extract slide type from first-line comment */
            const typeMatch = html.match(/<!--\s*slide-type:\s*(\S+)\s*-->/);
            const type = typeMatch ? typeMatch[1] : 'content';

            /* Create section and inject content */
            const section = document.createElement('section');
            section.className = 'slide slide-' + type;
            section.innerHTML = html;
            container.appendChild(section);
          } catch (e) {
            /* Skip slides that fail to load */
          }
        }

        slides = Array.from(container.querySelectorAll('.slide'));
        if (slides.length === 0) return;

        /* Read hash or start at slide 1 */
        const hash = parseInt(location.hash.replace('#', ''), 10);
        current = (hash >= 1 && hash <= slides.length) ? hash - 1 : 0;

        showSlide(current);
      }

      /* ── Navigation ── */
      function showSlide(index) {
        if (index < 0 || index >= slides.length) return;
        slides.forEach(function (s) { s.classList.remove('active'); });

        /* Reset animations */
        slides[index].querySelectorAll('.animate-in').forEach(function (el) {
          el.style.animation = 'none';
          el.offsetHeight; /* trigger reflow */
          el.style.animation = '';
        });

        slides[index].classList.add('active');
        current = index;
        location.hash = '#' + (current + 1);
        updateUI();
      }

      function next() { showSlide(current + 1); }
      function prev() { showSlide(current - 1); }
      function first() { showSlide(0); }
      function last() { showSlide(slides.length - 1); }

      function updateUI() {
        /* Progress bar */
        var pct = ((current + 1) / slides.length) * 100;
        document.getElementById('progress-bar').style.width = pct + '%';

        /* Counter */
        document.getElementById('slide-counter').textContent =
          (current + 1) + ' / ' + slides.length;
      }

      /* ── Keyboard ── */
      document.addEventListener('keydown', function (e) {
        /* Ignore if user is typing in an input */
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

        switch (e.key) {
          case 'ArrowRight':
          case 'ArrowDown':
          case ' ':
          case 'Enter':
          case 'PageDown':
            e.preventDefault(); next(); break;
          case 'ArrowLeft':
          case 'ArrowUp':
          case 'Backspace':
          case 'PageUp':
            e.preventDefault(); prev(); break;
          case 'Home':
            e.preventDefault(); first(); break;
          case 'End':
            e.preventDefault(); last(); break;
          case 'f':
          case 'F':
            e.preventDefault();
            if (!document.fullscreenElement) {
              document.documentElement.requestFullscreen();
            } else {
              document.exitFullscreen();
            }
            break;
          case 'p':
          case 'P':
            e.preventDefault(); window.print(); break;
        }
      });

      /* ── Handle hash changes (e.g., manual URL edit) ── */
      window.addEventListener('hashchange', function () {
        var hash = parseInt(location.hash.replace('#', ''), 10);
        if (hash >= 1 && hash <= slides.length) {
          showSlide(hash - 1);
        }
      });

      /* ── Init ── */
      loadSlides();
    })();
  </script>
</body>
</html>
